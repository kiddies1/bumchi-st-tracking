name: Process Shipping Label
on:
  push:
    paths:
      - 'labels/pending/**'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  PYTHONUNBUFFERED: "1"

jobs:
  ocr-job:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5 # Updated to v5
        with:
          python-version: '3.12' # Using a modern version to avoid EOL warnings

      - name: Install Dependencies
        run: pip install google-genai # Updated to the new package

      - name: Run OCR and Move Files
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python -u process_label.py

      - name: Commit Move
        run: |
          git config --global user.name "LabelBot"
          git config --global user.email "bot@github.com"
          git add labels/
          git commit -m "Automated: Moved processed labels" || echo "No changes"
          git push

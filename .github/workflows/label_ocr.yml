name: Process Shipping Label
on:
  push:
    paths:
      - 'labels/pending/**'
  workflow_dispatch: # Enable manual trigger

env:
  # This tells GitHub to use the newer Node engine and stops the warning
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true 
  # This forces Python to show logs immediately (Fixes your "missing print" issue)
  PYTHONUNBUFFERED: "1"

jobs:
  ocr-job:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: pip install google-generativeai

      - name: Create Processed Folder
        run: mkdir -p labels/processed

      - name: Run OCR and Move Files
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python -u process_label.py

      - name: Commit Move
        run: |
          git config --global user.name "LabelBot"
          git config --global user.email "bot@github.com"
          git add labels/
          git commit -m "Automated: Moved processed labels to history" || echo "No changes to commit here"
          git push

name: Process Shipping Label
on:
  push:
    paths:
      - 'labels/pending/**'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  PYTHONUNBUFFERED: "1"

jobs:
  ocr-job:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Dependencies
        run: |
          pip install google-genai pydantic

      - name: Run OCR and Move Files
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python -u process_label.py

      - name: Commit and Push Logs
        run: |
          git config --global user.name "LabelBot"
          git config --global user.email "bot@github.com"
          
          # Crucial: Stage the CSV file and the deletions in the labels folder
          git add shipping_master_log.csv
          git add labels/
          
          # [skip ci] prevents the workflow from triggering itself after the push
          git commit -m "Automated: Logged labels and cleaned pending [skip ci]" || echo "No changes"
          git push
